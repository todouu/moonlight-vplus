name: Upstream Sync

on:
  schedule:
    - cron: '0 2 * * 1'   # every Monday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest upstream release
        id: upstream
        run: |
          RESPONSE=$(curl -sf "https://api.github.com/repos/qiin2333/moonlight-android/releases/latest")
          VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Upstream latest release: $VERSION"

      - name: Check if already synced
        id: check
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "${VERSION}"; then
            echo "already_synced=true" >> $GITHUB_OUTPUT
            echo "Tag ${VERSION} already exists in this repo, skipping."
          else
            echo "already_synced=false" >> $GITHUB_OUTPUT
            echo "New upstream version ${VERSION} detected."
          fi

      - name: Add upstream remote and fetch
        if: steps.check.outputs.already_synced == 'false'
        run: |
          git remote add upstream https://github.com/qiin2333/moonlight-android.git
          git fetch upstream --tags

      - name: Attempt merge
        if: steps.check.outputs.already_synced == 'false'
        id: merge
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          git config user.name "todou"
          git config user.email "pslzj@outlook.com"

          if git merge "upstream/${VERSION}" --no-edit --allow-unrelated-histories; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "Merge succeeded."
          else
            echo "success=false" >> $GITHUB_OUTPUT
            git merge --abort || true
            echo "Merge failed due to conflicts."
          fi

      - name: Push merged master and create release tag
        if: steps.check.outputs.already_synced == 'false' && steps.merge.outputs.success == 'true'
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          git push origin master
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Pushed tag $VERSION — android-ci.yml build triggered."

      - name: Send failure email
        if: steps.check.outputs.already_synced == 'false' && steps.merge.outputs.success == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          secure: false
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "[moonlight-vplus] Upstream sync failed — merge conflict (${{ steps.upstream.outputs.version }})"
          to: pslzj@outlook.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            Upstream sync failed for moonlight-vplus.

            Upstream version : ${{ steps.upstream.outputs.version }}
            Upstream repo    : https://github.com/qiin2333/moonlight-android
            Your repo        : https://github.com/${{ github.repository }}

            The automatic merge encountered conflicts and was aborted.
            Please resolve them manually:

              git remote add upstream https://github.com/qiin2333/moonlight-android.git
              git fetch upstream --tags
              git merge upstream/${{ steps.upstream.outputs.version }}
              # resolve conflicts, then:
              git push origin master
              git tag ${{ steps.upstream.outputs.version }}
              git push origin ${{ steps.upstream.outputs.version }}

            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
